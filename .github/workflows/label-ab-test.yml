name: Label PRs needing A/B test

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'templates/extraction/**'
      - 'tools/semantic_extraction.py'
      - 'tools/bootstrap_session.py'

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;

            // Ensure label exists (handles fresh repos)
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'needs-ab-test' });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: 'needs-ab-test',
                  color: 'D93F0B',
                  description: 'PR requires A/B test before merge'
                });
              }
            }

            // Add label
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr_number,
              labels: ['needs-ab-test']
            });

            // Check if we already commented (paginate to avoid missing on busy PRs)
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr_number, per_page: 100 }
            );
            const botComment = comments.find(c =>
              c.body.includes('This PR modifies extraction behavior')
            );

            if (!botComment) {
              const repoUrl = `https://github.com/${owner}/${repo}/blob/main`;
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr_number,
                body: `## ⚠️ A/B Test Required\n\nThis PR modifies extraction behavior (files in \`templates/extraction/\` or extraction tools). Per the [A/B test standard](${repoUrl}/docs/ab-test-standard.md), extraction quality changes require empirical validation before merge.\n\n**Required before merge:**\n- [ ] A/B test results posted as a PR comment\n- [ ] ≥3 paired runs per variant (only if temperature > 0; 1 run suffices at temp 0)\n- [ ] Entity count comparison with acceptable variance\n\nSee the [A/B test checklist](${repoUrl}/docs/ab-test-checklist.md) for details.`
              });
            }
